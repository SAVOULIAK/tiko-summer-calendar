<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TIKO Summer Calendar 2026</title>

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- =====================================================
       ОСНОВНОЙ КОНТЕЙНЕР
       ===================================================== -->
  <main class="passport">

    <!-- =====================================================
         ВЕРХНЯЯ ЧАСТЬ (обложка)
         ===================================================== -->
    <section class="passport-cover">
      <img 
        src="passport.png" 
        alt="Passport cover design" 
        class="passport-full-image" 
      />
    </section>

    <!-- =====================================================
         КАЛЕНДАРЬ
         ===================================================== -->
    <section class="calendar-section">

      <div class="section-header">
        <h2>Border Stamps / Summer Weeks</h2>
        <p id="statusText">Checking current week...</p>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>

    </section>

  </main>

  <!-- =====================================================
       МОДАЛЬНОЕ ОКНО
       ===================================================== -->
  <div id="eventModal" class="modal hidden">

    <div class="modal-card">

      <!-- Кнопка закрытия -->
      <button id="closeModal" class="close-btn" aria-label="Close">×</button>

      <!-- Штамп -->
      <div class="modal-stamp">ENTRY PERMITTED</div>

      <!-- Контент -->
      <h3 id="modalTitle">Event title</h3>

      <p id="modalDate" class="modal-date"></p>
      <p id="modalNickname" class="modal-nickname"></p>
      <p id="modalDescription" class="modal-description"></p>

      <!-- Фото события -->
      <img id="modalImage" class="modal-image" src="" alt="" hidden />

      <!-- КАРТА -->
      <div class="modal-map">
        <iframe
          id="modalMapFrame"
          src=""
          width="100%"
          height="250"
          title="Event location map"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

    </div>

  </div>

  <!-- =====================================================
       JS
       ===================================================== -->
  <script src="script.js"></script>

</body>
</html>
