<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TIKO Summer Calendar 2026</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body data-lang="en">

  <!-- Language toggle -->
  <button id="langToggle" class="lang-toggle" type="button">Suomeksi</button>

  <!-- =====================================================
       MAIN CONTAINER
       ===================================================== -->
  <main class="passport">

    <!-- =====================================================
         TOP COVER
         ===================================================== -->
    <section class="passport-cover">
      <img
        src="passport.png"
        alt="Passport cover design"
        class="passport-full-image"
      />
    </section>

    <!-- =====================================================
         CALENDAR
         ===================================================== -->
    <section class="calendar-section">

      <div class="section-header">
        <h2>Border Stamps / Summer Weeks</h2>
        <p id="statusText">Checking current week...</p>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>

    </section>

  </main>

  <!-- =====================================================
       MODAL
       ===================================================== -->
  <div id="eventModal" class="modal hidden">

    <div class="modal-card">

      <!-- Close button -->
      <button id="closeModal" class="close-btn" aria-label="Close">×</button>

      <!-- Stamp -->
      <div class="modal-stamp">ENTRY PERMITTED</div>

      <!-- Content -->
      <h3 id="modalTitle">Event title</h3>

      <p id="modalDate" class="modal-date"></p>
      <p id="modalNickname" class="modal-nickname"></p>
      <p id="modalDescription" class="modal-description"></p>

      <!-- Event photo -->
      <img id="modalImage" class="modal-image" src="" alt="" hidden />

      <!-- Map -->
      <div class="modal-map">
        <iframe
          id="modalMapFrame"
          src=""
          width="100%"
          height="250"
          title="Event location map"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

    </div>

  </div>

  <!-- =====================================================
       JS
       ===================================================== -->
  <script src="script.js"></script>

</body>
</html>
